<!doctype html>
<html id="fuse" lang="en">

<head>
    <title>The Hagen Family Foundation</title>
    <meta charset="utf-8">
    <meta name="description"
        content="The Hagen Family Foundation provides financial grants to not-for-profit organizations in the areas of the arts, education, environment, religion, and social services.">
    <meta name="keywords"
        content="Fuse,HTML,CSS,Angular,Angular 2,Angular 11,Angular 12,Angular 13,Material,Material 2,Angular Components,Tailwind,Tailwind CSS,TailwindCSS,Admin Template,Admin Starter Kit">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0">

    <base href="/">

    <!-- Fuse 21 global theme (Tailwind v4 output; linked asset — avoids PostCSS/Tailwind v3 on this file) -->
    <link href="assets/styles/fuse-theme.compiled.css" rel="stylesheet">

    <!-- Favicon -->
    <!-- <link
        rel="icon"
        type="image/x-icon"
        href="favicon.ico"> -->
    <link rel="icon" type="image/png" href="favicon-16x16.png">
    <link rel="icon" type="image/png" href="favicon-32x32.png">

    <!-- Fonts (legacy Inter + IBM Plex Mono; Geist is loaded via fuse-next-styles when /fonts/geist/* exist) -->
    <link href="assets/fonts/inter/inter.css" rel="stylesheet">

    <link href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
        rel="stylesheet">

    <!-- Icon fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Splash screen styles -->
    <link href="assets/styles/splash-screen.css" rel="stylesheet">

    <script>
        var host = "www.hagenfamilyfoundation.org";
        if ((host == window.location.host) && (window.location.protocol != "https:")) {
            window.location.protocol = "https";
        }
    </script>
</head>

<body>
    <!-- Apply light/dark scheme class before paint (matches Fuse 21) -->
    <script>
        !function(){try{const e=document.documentElement.classList;e.remove("scheme-dark","scheme-light");const c=localStorage.getItem("scheme"),t=window.matchMedia("(prefers-color-scheme: dark)").matches,s="dark"===c||"system"===c&&t?"scheme-dark":"scheme-light";e.add(s)}catch(e){}}();
    </script>

    <!-- Splash screen -->
    <fuse-splash-screen>
        <img src="assets/images/logo/image2vector.svg" alt="Fuse logo">
        <div class="spinner">
            <div class="bounce1"></div>
            <div class="bounce2"></div>
            <div class="bounce3"></div>
        </div>
    </fuse-splash-screen>

    <!-- App root -->
    <app-root></app-root>

</body>

</html>
