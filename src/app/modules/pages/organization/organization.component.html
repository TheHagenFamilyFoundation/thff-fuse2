<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="bg-card border-b">
        <div class="flex items-center w-full max-w-screen-xl mx-auto px-6 sm:px-8 py-6 sm:py-8">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight truncate m-0">
                <span *ngIf="viewing" class="text-gray-400 font-normal">{{ viewing }}</span>
                {{ org?.name }}
            </h1>
        </div>
    </div>

    <!-- Section Nav -->
    <div class="sticky top-0 z-10 bg-card border-b shadow-sm">
        <nav class="flex items-center gap-1 w-full max-w-screen-xl mx-auto px-6 sm:px-8 py-2">
            <a (click)="scrollTo('profile')"
               class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 rounded-md cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-700 hover:text-gray-900 dark:hover:text-white transition-colors">
                Profile
            </a>
            <a (click)="scrollTo('proposals')"
               class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 rounded-md cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-700 hover:text-gray-900 dark:hover:text-white transition-colors">
                Proposals
            </a>
            <a (click)="scrollTo('doc501c3')"
               class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 rounded-md cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-700 hover:text-gray-900 dark:hover:text-white transition-colors">
                501c3
            </a>
            <a (click)="scrollTo('team')"
               class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 rounded-md cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-700 hover:text-gray-900 dark:hover:text-white transition-colors">
                Team
            </a>
        </nav>
    </div>

    <!-- Scrollable sections -->
    <div class="w-full max-w-screen-xl mx-auto p-6 sm:p-8 space-y-8" *ngIf="org">

        <!-- Organization Profile -->
        <fuse-card id="profile" class="flex flex-col w-full p-6 sm:p-8 scroll-mt-20">
            <app-organization-info
                (refreshOrg)="refreshOrg()"
                [org]="org"
                [isDirector]="isDirector"
                [inOrg]="inOrg">
            </app-organization-info>
        </fuse-card>

        <!-- Proposals -->
        <fuse-card id="proposals" class="flex flex-col w-full p-6 sm:p-8 scroll-mt-20">
            <app-org-proposals [org]="org"></app-org-proposals>
        </fuse-card>

        <!-- 501c3 Document -->
        <fuse-card id="doc501c3" class="flex flex-col w-full p-6 sm:p-8 scroll-mt-20">
            <div class="flex items-center mb-6">
                <mat-icon class="text-thff-teal icon-size-7 mr-3">description</mat-icon>
                <h2 class="text-xl font-semibold m-0">501(c)(3) Document</h2>
            </div>
            <app-org-doc501c3 [org]="org"></app-org-doc501c3>
        </fuse-card>

        <!-- Team -->
        <fuse-card id="team" class="flex flex-col w-full p-6 sm:p-8 scroll-mt-20">
            <div class="flex items-center mb-4">
                <mat-icon class="text-thff-teal icon-size-7 mr-3">group</mat-icon>
                <h2 class="text-xl font-semibold m-0">Team</h2>
            </div>
            <app-org-team
                [org]="org"
                [inOrg]="inOrg"
                [isDirector]="isDirector"
                (refreshOrg)="refreshOrg()">
            </app-org-team>
        </fuse-card>

    </div>

</div>
