<div class="flex flex-col grow">

    <!-- Header row -->
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold m-0">Proposals</h2>

        <!-- Year Selector -->
        <mat-form-field class="w-36 -mb-5">
            <mat-label>Year</mat-label>
            <mat-select [(value)]="selectedYear" (selectionChange)="yearChanged($event)">
                <mat-option *ngFor="let year of years" [value]="year._id">
                    {{ year.year }}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <!-- Filter -->
    <mat-form-field class="w-full max-w-sm mb-4">
        <mat-icon matPrefix class="mr-2">search</mat-icon>
        <input matInput placeholder="Filter proposals..." #filterInput>
    </mat-form-field>

    <!-- Table -->
    <div class="flex flex-col w-full overflow-hidden border rounded-lg">
        <mat-table [dataSource]="data" matSort class="w-full">

            <!-- Project Title Column -->
            <ng-container matColumnDef="projectTitle">
                <mat-header-cell *matHeaderCellDef mat-sort-header class="pl-6 font-semibold">
                    Project Title
                </mat-header-cell>
                <mat-cell *matCellDef="let row" class="pl-6 font-medium">
                    {{ row.projectTitle }}
                </mat-cell>
            </ng-container>

            <!-- Amount Requested Column -->
            <ng-container matColumnDef="amountRequested">
                <mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">
                    Amount Requested
                </mat-header-cell>
                <mat-cell *matCellDef="let row" class="text-gray-600 dark:text-gray-300">
                    {{ row.amountRequested | currency }}
                </mat-cell>
            </ng-container>

            <!-- Sponsor Column -->
            <ng-container matColumnDef="sponsor">
                <mat-header-cell *matHeaderCellDef class="font-semibold">
                    Sponsor
                </mat-header-cell>
                <mat-cell *matCellDef="let row" class="text-gray-600 dark:text-gray-300">
                    <span *ngIf="row.sponsor" class="inline-flex items-center gap-1.5">
                        <mat-icon class="icon-size-4 text-primary">person</mat-icon>
                        {{ row.sponsor.firstName || row.sponsor.email || 'Sponsor' }}
                    </span>
                    <span *ngIf="!row.sponsor" class="text-gray-400">—</span>
                </mat-cell>
            </ng-container>

            <!-- Created On Column -->
            <ng-container matColumnDef="createdOn">
                <mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">
                    Created On
                </mat-header-cell>
                <mat-cell *matCellDef="let row" class="text-gray-500">
                    {{ row.createdAt | date : "MM/dd/yyyy" }}
                </mat-cell>
            </ng-container>

            <!-- Action Column -->
            <ng-container matColumnDef="action">
                <mat-header-cell *matHeaderCellDef class="flex-none w-16"></mat-header-cell>
                <mat-cell *matCellDef="let row" class="flex-none w-16">
                    <mat-icon class="text-gray-400 icon-size-5">chevron_right</mat-icon>
                </mat-cell>
            </ng-container>

            <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
            <mat-row *matRowDef="let row; columns: displayedColumns"
                     class="org-row cursor-pointer"
                     (click)="goToProposal(row.proposalID)">
            </mat-row>
        </mat-table>

        <div *ngIf="!loaded" class="flex items-center justify-center py-12">
            <mat-spinner [diameter]="40"></mat-spinner>
        </div>

        <mat-paginator (page)="handlePageEvent($event)" [length]="propCount"
                       [pageSizeOptions]="[5, 10, 25]"></mat-paginator>
    </div>

    <!-- Portal status -->
    <div *ngIf="!portalOpen" class="mt-6 text-gray-500">
        <p class="m-0">{{ portalMessage }}</p>
    </div>

    <div *ngIf="portalOpen" class="mt-6">
        <button mat-flat-button color="primary" (click)="createProposal()">
            <mat-icon class="mr-2 icon-size-5">add</mat-icon>
            <span>Create Proposal</span>
        </button>
    </div>

</div>
