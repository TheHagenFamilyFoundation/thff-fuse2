<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="bg-card border-b">
        <div class="flex items-center w-full max-w-screen-xl mx-auto px-6 sm:px-8 py-6 sm:py-8">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight truncate m-0">
                View Organizations
            </h1>
        </div>
    </div>

    <!-- Main -->
    <div class="w-full max-w-screen-xl mx-auto p-6 sm:p-8">

        <!-- Filter -->
        <mat-form-field class="w-full max-w-sm mb-4">
            <mat-icon matPrefix class="mr-2">search</mat-icon>
            <input matInput placeholder="Filter organizations..." #filterInput>
        </mat-form-field>

        <!-- Table -->
        <fuse-card class="flex flex-col w-full overflow-hidden">
            <mat-table [dataSource]="data" matSort matSortActive="createdOn" matSortDisableClear
                       matSortDirection="desc" class="w-full">

                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <mat-header-cell *matHeaderCellDef mat-sort-header class="pl-6 font-semibold">
                        Name
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" class="pl-6 font-medium">
                        {{ row.name }}
                    </mat-cell>
                </ng-container>

                <!-- Created On Column -->
                <ng-container matColumnDef="createdOn">
                    <mat-header-cell *matHeaderCellDef mat-sort-header disableClear class="font-semibold">
                        Created On
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" class="text-gray-500">
                        {{ row.createdAt | date: "MM/dd/yyyy" }}
                    </mat-cell>
                </ng-container>

                <!-- Users Column -->
                <ng-container matColumnDef="users">
                    <mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">
                        Users
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" class="text-gray-500">
                        {{ row.users.length }}
                    </mat-cell>
                </ng-container>

                <!-- Proposals Column -->
                <ng-container matColumnDef="proposals">
                    <mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">
                        Proposals
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" class="text-gray-500">
                        {{ row.proposals.length }}
                    </mat-cell>
                </ng-container>

                <!-- Action Column -->
                <ng-container matColumnDef="action">
                    <mat-header-cell *matHeaderCellDef class="flex-none w-16"></mat-header-cell>
                    <mat-cell *matCellDef="let row" class="flex-none w-16">
                        <mat-icon class="text-gray-400 icon-size-5">chevron_right</mat-icon>
                    </mat-cell>
                </ng-container>

                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row *matRowDef="let row; columns: displayedColumns"
                         class="org-row cursor-pointer"
                         (click)="goToOrganization(row.organizationID)">
                </mat-row>
            </mat-table>

            <div *ngIf="!loaded" class="flex items-center justify-center py-12">
                <mat-spinner [diameter]="40"></mat-spinner>
            </div>

            <mat-paginator (page)="handlePageEvent($event)" [length]="orgCount"
                           [pageSizeOptions]="[10, 25, 100]"></mat-paginator>
        </fuse-card>

    </div>

</div>
