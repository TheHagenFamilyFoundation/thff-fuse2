<div class="flex flex-col flex-auto min-w-0">

    <!-- Header -->
    <div class="bg-card border-b">
        <div class="flex items-center justify-between w-full max-w-screen-xl mx-auto px-6 sm:px-8 py-6 sm:py-8">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight truncate m-0">
                Organizations
            </h1>
            <!-- Compact primary CTA: global mat-button min-height was stretching this row vs Director header -->
            <button
                mat-flat-button
                color="primary"
                type="button"
                class="orgs-header-create !min-h-10 shrink-0 px-4"
                (click)="createOrganization()">
                <mat-icon class="mr-1.5 icon-size-5">add</mat-icon>
                <span>Create Organization</span>
            </button>
        </div>
    </div>

    <!-- Main -->
    <div class="w-full max-w-screen-lg mx-auto p-6 sm:p-8">

        <!-- Loading State -->
        <div *ngIf="!loaded" class="flex flex-col items-center justify-center gap-4 py-20">
            <mat-spinner [diameter]="48"></mat-spinner>
            <p class="text-sm text-gray-500 dark:text-gray-400 m-0">Loading organizations…</p>
        </div>

        <!-- Empty State -->
        <div *ngIf="loaded && !hasOrganizations"
             class="flex flex-col items-center justify-center py-20 text-center">
            <mat-icon class="icon-size-16 text-gray-300 mb-4">business</mat-icon>
            <h2 class="text-xl font-semibold text-gray-700 mb-2">No organizations yet</h2>
            <p class="text-gray-500 mb-6 max-w-sm">
                Create an organization to start submitting grant proposals to The Hagen Family Foundation.
            </p>
            <button mat-flat-button color="primary" (click)="createOrganization()">
                <mat-icon class="mr-2 icon-size-5">add</mat-icon>
                <span>Create Organization</span>
            </button>
        </div>

        <!-- Table -->
        <fuse-card *ngIf="loaded && hasOrganizations" class="flex flex-col w-full overflow-hidden">

            <mat-table [dataSource]="dataSource" matSort class="w-full">

                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <mat-header-cell *matHeaderCellDef mat-sort-header class="pl-6 font-semibold">
                        Name
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" class="pl-6 font-medium">
                        {{ row.name }}
                    </mat-cell>
                </ng-container>

                <!-- Created On Column -->
                <ng-container matColumnDef="createdOn">
                    <mat-header-cell *matHeaderCellDef mat-sort-header class="font-semibold">
                        Created On
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" class="text-gray-500">
                        {{ row.createdAt | date : "MM/dd/yyyy" }}
                    </mat-cell>
                </ng-container>

                <!-- Action Column -->
                <ng-container matColumnDef="action">
                    <mat-header-cell *matHeaderCellDef class="flex-none w-24"></mat-header-cell>
                    <mat-cell *matCellDef="let row" class="flex-none w-24">
                        <mat-icon class="text-gray-400 icon-size-5">chevron_right</mat-icon>
                    </mat-cell>
                </ng-container>

                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row *matRowDef="let row; columns: displayedColumns"
                         class="org-row cursor-pointer"
                         (click)="goToOrganization(row.organizationID)">
                </mat-row>

            </mat-table>

            <mat-paginator [pageSize]="tablePageSize"
                           [pageSizeOptions]="tablePageSizeOptions"
                           (page)="onOrganizationsPage($event)"></mat-paginator>

        </fuse-card>

    </div>

</div>
