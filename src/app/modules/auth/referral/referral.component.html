<div class="flex flex-col items-center justify-center min-h-screen bg-gray-50 dark:bg-gray-900 px-6">
    <div class="w-full max-w-md">
        <fuse-card class="flex flex-col items-center p-8 text-center">
            <img class="w-24 mb-6" src="assets/images/logo/logo_2020_9.svg" alt="THFF Logo">

            <!-- Loading -->
            <div *ngIf="loading && isLoggedIn">
                <mat-spinner [diameter]="40" class="mx-auto mb-4"></mat-spinner>
                <p class="text-lg font-medium m-0">Applying referral code...</p>
            </div>

            <!-- Success -->
            <div *ngIf="!loading && sponsorName">
                <mat-icon class="icon-size-12 text-green-500 mb-4">check_circle</mat-icon>
                <p class="text-lg font-medium m-0 mb-2">Referral linked!</p>
                <p class="text-secondary m-0">
                    <strong>{{ sponsorName }}</strong> has been set as your sponsor.
                </p>
                <p class="text-sm text-hint mt-4 m-0">Redirecting to your dashboard...</p>
            </div>

            <!-- Error -->
            <div *ngIf="!loading && error">
                <mat-icon class="icon-size-12 text-warn mb-4">error</mat-icon>
                <p class="text-lg font-medium m-0 mb-2">Something went wrong</p>
                <p class="text-secondary m-0">{{ error }}</p>
                <p class="text-sm text-hint mt-4 m-0">Redirecting to your dashboard...</p>
            </div>
        </fuse-card>
    </div>
</div>
