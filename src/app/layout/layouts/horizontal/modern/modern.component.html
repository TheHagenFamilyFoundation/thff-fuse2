<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<!-- Wrapper -->
<div class="flex flex-col flex-auto w-full min-w-0">
    <!-- Header -->
    <div
        class="relative flex flex-0 items-center w-full h-16 sm:h-20 px-4 md:px-6 z-49 shadow dark:shadow-none dark:border-b bg-card dark:bg-transparent print:hidden">
        <!-- <ng-container *ngIf="!isScreenSmall"> -->
        <ng-container>
            <!-- Primary nav: anchors + routerLinkActive for hover / current-route feedback -->
            <nav class="modern-layout-top-nav flex flex-wrap items-center gap-0.5 mx-2 lg:mr-8" aria-label="Primary">
                <a
                    mat-icon-button
                    routerLink="/welcome"
                    routerLinkActive="modern-top-nav-active"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="modern-top-nav-link"
                    aria-label="Home">
                    <mat-icon>home</mat-icon>
                </a>
                <a
                    *ngIf="isLoggedIn"
                    mat-button
                    routerLink="/pages/organizations"
                    routerLinkActive="modern-top-nav-active"
                    class="modern-top-nav-link">
                    Organizations
                </a>
                <a
                    *ngIf="showProposalsNavLink"
                    mat-button
                    routerLink="/pages/proposals"
                    routerLinkActive="modern-top-nav-active"
                    [routerLinkActiveOptions]="{ paths: 'subset', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
                    class="modern-top-nav-link">
                    Proposals
                </a>
                <a
                    *ngIf="isDirector"
                    mat-button
                    routerLink="/pages/director"
                    routerLinkActive="modern-top-nav-active"
                    class="modern-top-nav-link">
                    Directors
                </a>
            </nav>
            <!-- Horizontal navigation -->
            <!-- <fuse-horizontal-navigation
                class="mr-2"
                [name]="'mainNavigation'"
                [navigation]="navigation.horizontal"></fuse-horizontal-navigation> -->
        </ng-container>
        <!-- Navigation toggle button -->
        <!-- <ng-container *ngIf="isScreenSmall">
            <button mat-icon-button (click)="toggleNavigation('mainNavigation')">
                <mat-icon [svgIcon]="'heroicons_outline:menu'"></mat-icon>
            </button>
        </ng-container> -->
        <!-- Components -->
        <div class="header-user-cluster flex items-center gap-1 pl-2 ml-auto sm:gap-1.5">
            <!-- <languages></languages>
            <fuse-fullscreen class="hidden md:block"></fuse-fullscreen>
            <search [appearance]="'bar'"></search>
            <shortcuts></shortcuts>
            <messages></messages>
            <notifications></notifications>
            <button
                class="lg:hidden"
                mat-icon-button
                (click)="quickChat.toggle()">
                <mat-icon [svgIcon]="'heroicons_outline:chat-alt-2'"></mat-icon>
            </button> -->
            <user></user>
        </div>
    </div>

    <!-- Content: min-h-0 lets the routed view scroll and fill height (flex overflow chain) -->
    <div class="flex flex-col flex-auto min-h-0 w-full">
        <!-- *ngIf="true" hack is required here for router-outlet to work correctly.
             Otherwise, layout changes won't be registered and the view won't be updated! -->
        <router-outlet *ngIf="true"></router-outlet>
    </div>

    <!-- Footer: compact strip (copyright only) -->
    <footer
        class="modern-layout-footer relative flex flex-0 items-center w-full py-2 sm:py-2.5 px-4 md:px-6 z-49 border-t bg-card dark:bg-transparent print:hidden">
        <span class="modern-layout-footer-text font-medium text-secondary">
            THFF &copy; {{ currentYear }} - {{ version }}
        </span>
    </footer>
</div>
