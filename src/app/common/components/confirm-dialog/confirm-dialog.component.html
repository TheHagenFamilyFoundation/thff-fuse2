<div class="flex flex-col max-w-md">
    <h2 mat-dialog-title class="text-lg font-semibold m-0 mb-2">{{ data.title }}</h2>

    <mat-dialog-content>
        <p
            class="m-0"
            [ngClass]="
                data.messageVariant === 'success'
                    ? 'text-primary-700 dark:text-primary-200 font-medium'
                    : 'text-gray-600 dark:text-gray-300'
            ">
            {{ data.message }}
        </p>
    </mat-dialog-content>

    <mat-dialog-actions class="flex justify-end gap-2 pt-4">
        <button *ngIf="!data.alertOnly" mat-button type="button" (click)="onCancel()">
            {{ data.cancelText }}
        </button>
        <button
            mat-flat-button
            type="button"
            [color]="data.warn ? 'warn' : 'primary'"
            (click)="onConfirm()"
        >
            {{ data.confirmText }}
        </button>
    </mat-dialog-actions>
</div>
