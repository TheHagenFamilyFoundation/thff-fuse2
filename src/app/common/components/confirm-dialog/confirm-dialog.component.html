<div class="flex flex-col max-w-md">
    <!-- Title -->
    <h2 mat-dialog-title class="text-lg font-semibold m-0 mb-2">{{ data.title }}</h2>

    <!-- Message -->
    <mat-dialog-content>
        <p class="text-gray-600 m-0">{{ data.message }}</p>
    </mat-dialog-content>

    <!-- Actions -->
    <mat-dialog-actions class="flex justify-end gap-2 pt-4">
        <button mat-button (click)="onCancel()">{{ data.cancelText }}</button>
        <button mat-flat-button
                [color]="data.warn ? 'warn' : 'primary'"
                (click)="onConfirm()">
            {{ data.confirmText }}
        </button>
    </mat-dialog-actions>
</div>
